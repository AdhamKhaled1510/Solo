name: Build Android APK

on:
  push:
    branches: [master, main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 17

      - uses: subosito/flutter-action@v2
        with:
          channel: stable

      - run: flutter pub get

      - run: flutter build apk --debug

      - name: Get version
        id: version
        run: |
          echo "build_number=$(date +%s)" >> $GITHUB_OUTPUT
          echo "tag=v$(date +%Y.%m.%d)-${{ github.run_number }}" >> $GITHUB_OUTPUT

      - uses: actions/upload-artifact@v4
        with:
          name: mystudy-app-debug
          path: build/app/outputs/flutter-apk/app-debug.apk

      - name: Delete old latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release delete latest --yes 2>/dev/null || true
          git push --delete origin refs/tags/latest 2>/dev/null || true

      - name: Create latest release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create latest \
            --title "Build ${{ steps.version.outputs.tag }}" \
            --notes "Auto-built APK from commit ${{ github.sha }}" \
            --target ${{ github.sha }} \
            build/app/outputs/flutter-apk/app-debug.apk

      - name: Update version.json
        run: |
          echo '{"version":"${{ steps.version.outputs.tag }}","buildNumber":${{ steps.version.outputs.build_number }}}' > version.json

      - name: Commit version.json
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
          git add version.json
          git commit -m "Update version.json to ${{ steps.version.outputs.tag }}" || true
          git push || true
